# =============================================================================
# sonar-project.properties — SonarQube Scanner Configuration
# =============================================================================
# Configure this file if using SonarQube for SAST analysis.
# Place in project root or reference via -Dproject.settings=
# =============================================================================

# Project identification
sonar.projectKey=catool-project
sonar.projectName=CAT Tool Project
sonar.projectVersion=1.0

# Source directories (adjust to your project)
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/vendor/**,**/.trivy-cache/**,**/security-reports/**,**/*.yml,**/*.yaml

# Language-specific settings
# sonar.language=java
# sonar.java.binaries=target/classes

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate — wait for results
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Coverage report paths (adjust based on language)
# sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
# sonar.python.coverage.reportPaths=coverage.xml
