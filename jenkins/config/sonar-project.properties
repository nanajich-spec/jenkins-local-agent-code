# =============================================================================
# sonar-project.properties — SonarQube Scanner Configuration
# =============================================================================
# Configure this file if using SonarQube for SAST analysis.
# Place in project root or reference via -Dproject.settings=
# Used by the Comprehensive DevSecOps Pipeline (Stage 8)
# =============================================================================

# Project identification
sonar.projectKey=catool-project
sonar.projectName=CAT Tool Project
sonar.projectVersion=1.0

# Source directories (adjust to your project)
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/vendor/**,**/.trivy-cache/**,**/security-reports/**,**/pipeline-reports/**,**/*.yml,**/*.yaml,**/*.json

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate — wait for results
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

